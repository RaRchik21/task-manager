<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #F5F0E8;
      color: #2C2C2A;
      min-height: 100vh;
    }

    /* ── ШАПКА ── */
    header {
      background: rgba(237,232,223,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(211,209,199,0.6);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    header h1 { font-size: 16px; font-weight: 700; color: #2C2C2A; letter-spacing: -0.3px; }
    .header-center {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 320px;
      margin: 0 24px;
    }
    .search-input {
      width: 100%;
      padding: 6px 12px 6px 32px;
      border: 1px solid rgba(211,209,199,0.8);
      border-radius: 20px;
      font-size: 13px;
      background: rgba(255,255,255,0.6);
      outline: none;
      transition: all 0.2s;
    }
    .search-input:focus { background: white; border-color: #888780; }
    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #888780;
    }
    .header-stats { font-size: 12px; color: #888780; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-badge {
      background: rgba(211,209,199,0.7);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      color: #444441;
    }
    .header-btn {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(211,209,199,0.8);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 13px;
      color: #5F5E5A;
      cursor: pointer;
      transition: all 0.15s;
    }
    .header-btn:hover { background: rgba(232,226,216,0.8); }

    /* ── СТАТИСТИКА ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 8px 24px;
      background: rgba(237,232,223,0.5);
      border-bottom: 1px solid rgba(211,209,199,0.3);
      font-size: 12px;
      color: #888780;
    }
    .stats-bar strong { color: #444441; }

    /* ── ДОСКА ── */
    .board-wrapper { padding: 24px; overflow-x: auto; }
    .board { display: flex; gap: 16px; align-items: flex-start; min-height: calc(100vh - 120px); }

    /* ── КОЛОНКА ── */
    .column {
      background: rgba(232,226,216,0.7);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 12px;
      width: 280px;
      min-width: 280px;
      border: 1px solid rgba(211,209,199,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .column:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.07); }
    .column.collapsed { width: 56px; min-width: 56px; padding: 12px 8px; overflow: hidden; }
    .column.drag-over { border: 2px dashed #888780; }
    .column.dragging-col { opacity: 0.5; }
    .column .tasks { min-height: 60px; }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 2px;
      gap: 6px;
    }
    .column-title {
      font-size: 14px; font-weight: 600; color: #444441;
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .column-count {
      background: rgba(211,209,199,0.8);
      border-radius: 10px; padding: 2px 8px; font-size: 11px; color: #5F5E5A; white-space: nowrap;
    }
    .column-actions { display: flex; gap: 4px; }
    .col-btn {
      background: none; border: none; cursor: pointer; font-size: 13px;
      color: #888780; padding: 2px 4px; border-radius: 4px; transition: all 0.15s;
    }
    .col-btn:hover { background: rgba(0,0,0,0.06); color: #444441; }

    .column.collapsed .column-title {
      writing-mode: vertical-rl; transform: rotate(180deg);
      margin: 8px auto; display: block; white-space: nowrap;
    }
    .column.collapsed .tasks,
    .column.collapsed .btn-add-task,
    .column.collapsed .column-count,
    .column.collapsed .column-actions { display: none; }
    .column.collapsed .column-header { flex-direction: column; margin-bottom: 0; }

    /* ── КАРТОЧКА ── */
    .task-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(4px);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
      border: 1px solid rgba(232,226,216,0.8);
      cursor: grab; transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
    }
    .task-card:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(0,0,0,0.09); }
    .task-card:active { cursor: grabbing; }
    .task-card.dragging { opacity: 0.4; transform: scale(1.04); }

    .priority-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 10px 0 0 10px;
    }
    .priority-high { background: #E24B4A; }
    .priority-medium { background: #EF9F27; }
    .priority-low { background: #639922; }

    .task-title { font-size: 14px; color: #2C2C2A; margin-bottom: 4px; padding-left: 8px; }
    .task-comment { font-size: 12px; color: #888780; margin-bottom: 4px; padding-left: 8px; font-style: italic; }
    .task-meta { font-size: 11px; color: #888780; display: flex; gap: 8px; flex-wrap: wrap; padding-left: 8px; align-items: center; }
    .task-time { color: #5F5E5A; }
    .task-deadline { padding: 1px 6px; border-radius: 4px; font-size: 11px; }
    .deadline-ok { background: #EAF3DE; color: #3B6D11; }
    .deadline-soon { background: #FAEEDA; color: #854F0B; }
    .deadline-overdue { background: #FCEBEB; color: #A32D2D; }
    .task-footer { display: flex; justify-content: flex-end; gap: 4px; margin-top: 6px; }
    .task-action-btn {
      background: none; border: none; cursor: pointer; font-size: 11px;
      color: #B4B2A9; padding: 2px 4px; border-radius: 4px; transition: all 0.15s;
    }
    .task-action-btn:hover { background: rgba(0,0,0,0.05); color: #5F5E5A; }

    .drag-placeholder {
      height: 44px; border-radius: 10px;
      background: rgba(211,209,199,0.4); margin-bottom: 8px;
      border: 2px dashed rgba(180,178,169,0.6);
    }

    /* ── КНОПКИ ── */
    .btn-add-task {
      width: 100%; background: none; border: 1px dashed rgba(180,178,169,0.7);
      border-radius: 8px; padding: 8px; font-size: 13px; color: #888780;
      cursor: pointer; margin-top: 4px; transition: all 0.15s;
    }
    .btn-add-task:hover { background: rgba(241,239,232,0.8); color: #5F5E5A; }

    .btn-add-column {
      background: rgba(237,232,223,0.5); border: 1px dashed rgba(180,178,169,0.7);
      border-radius: 14px; padding: 12px 20px; font-size: 14px; color: #888780;
      cursor: pointer; min-width: 180px; white-space: nowrap; align-self: flex-start; transition: all 0.15s;
    }
    .btn-add-column:hover { background: rgba(232,226,216,0.8); color: #5F5E5A; }

    /* ── МОДАЛКИ ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.25); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: rgba(245,240,232,0.97); backdrop-filter: blur(20px);
      border-radius: 18px; padding: 24px; width: 400px;
      border: 1px solid rgba(211,209,199,0.6);
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #2C2C2A; }
    .modal label { font-size: 12px; color: #888780; display: block; margin-bottom: 4px; }
    .modal input, .modal select, .modal textarea {
      width: 100%; padding: 8px 12px;
      border: 1px solid rgba(211,209,199,0.8); border-radius: 10px;
      font-size: 14px; background: rgba(255,255,255,0.7);
      margin-bottom: 10px; outline: none; font-family: inherit; transition: all 0.15s;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus { background: white; border-color: #888780; }
    .modal textarea { resize: vertical; min-height: 60px; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-primary {
      background: #444441; color: white; border: none;
      border-radius: 10px; padding: 8px 18px; font-size: 14px; cursor: pointer; transition: all 0.15s;
    }
    .btn-primary:hover { background: #2C2C2A; }
    .btn-cancel {
      background: none; border: 1px solid rgba(211,209,199,0.8);
      border-radius: 10px; padding: 8px 16px; font-size: 14px; cursor: pointer; color: #5F5E5A; transition: all 0.15s;
    }
    .btn-cancel:hover { background: rgba(232,226,216,0.8); }

    /* ── ЛОГИН ── */
    .login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #F5F0E8;
    }
    .login-card {
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
      border-radius: 20px; padding: 36px; width: 340px;
      border: 1px solid rgba(211,209,199,0.6); box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
    .login-card p { font-size: 14px; color: #888780; margin-bottom: 24px; }
    .login-card input {
      width: 100%; padding: 10px 14px; border: 1px solid rgba(211,209,199,0.8);
      border-radius: 10px; font-size: 14px; background: rgba(245,240,232,0.6);
      margin-bottom: 12px; outline: none; transition: all 0.15s;
    }
    .login-card input:focus { border-color: #888780; background: white; }
    .btn-login {
      width: 100%; background: #2C2C2A; color: white; border: none;
      border-radius: 10px; padding: 11px; font-size: 14px; cursor: pointer; margin-top: 4px; transition: all 0.15s;
    }
    .btn-login:hover { background: #444441; }
    .login-error { font-size: 13px; color: #993C1D; margin-top: 8px; display: none; }

    /* ── БОКОВЫЕ ПАНЕЛИ ── */
    .side-panel {
      position: fixed; top: 0; height: 100vh;
      background: rgba(245,240,232,0.97); backdrop-filter: blur(20px);
      border: 1px solid rgba(211,209,199,0.6); transition: 0.25s ease;
      z-index: 200; overflow-y: auto; box-shadow: 0 0 40px rgba(0,0,0,0.08);
    }
    .panel-right { right: -360px; width: 340px; border-left-width: 1px; }
    .panel-right.open { right: 0; }
    .panel-left { left: -420px; width: 400px; border-right-width: 1px; }
    .panel-left.open { left: 0; }
    .panel-wide { right: -420px; width: 400px; }
    .panel-wide.open { right: 0; }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px; border-bottom: 1px solid rgba(211,209,199,0.5);
      position: sticky; top: 0; background: rgba(245,240,232,0.97);
    }
    .panel-header h2 { font-size: 16px; font-weight: 600; }
    .panel-close {
      background: none; border: none; cursor: pointer; font-size: 18px;
      color: #888780; padding: 4px 8px; border-radius: 6px; line-height: 1; transition: all 0.15s;
    }
    .panel-close:hover { background: rgba(232,226,216,0.8); color: #2C2C2A; }
    .panel-body { padding: 20px 24px; }

    /* ── НАСТРОЙКИ ── */
    .settings-section { margin-bottom: 24px; }
    .settings-section > label {
      display: block; font-size: 11px; color: #888780; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500;
    }
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .theme-swatch {
      height: 52px; border-radius: 10px; cursor: pointer;
      border: 2px solid transparent; transition: all 0.15s; position: relative;
    }
    .theme-swatch:hover { transform: scale(1.05); }
    .theme-swatch.active { border-color: #444441; }
    .theme-swatch span {
      position: absolute; bottom: 4px; left: 0; right: 0;
      text-align: center; font-size: 10px; color: rgba(0,0,0,0.5);
    }
    .color-row, .opacity-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; padding: 8px 12px;
      background: rgba(255,255,255,0.5); border-radius: 10px; border: 1px solid rgba(211,209,199,0.4);
    }
    .color-row span, .opacity-row span { font-size: 13px; color: #444441; }
    .color-row input[type=color] {
      width: 36px; height: 26px; border: 1px solid rgba(211,209,199,0.8);
      border-radius: 6px; cursor: pointer; padding: 2px; background: white;
    }
    .opacity-row input[type=range] { width: 90px; }
    .opacity-val { font-size: 12px; color: #888780; min-width: 32px; text-align: right; }
    .btn-reset {
      width: 100%; background: none; border: 1px solid rgba(211,209,199,0.8);
      border-radius: 10px; padding: 8px; font-size: 13px; color: #888780; cursor: pointer; transition: all 0.15s;
    }
    .btn-reset:hover { background: rgba(232,226,216,0.8); }

    /* ── ПОЛЬЗОВАТЕЛИ ── */
    .user-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; border-bottom: 1px solid rgba(211,209,199,0.3); transition: background 0.15s;
    }
    .user-card:hover { background: rgba(232,226,216,0.4); }
    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(211,209,199,0.8); display: flex; align-items: center;
      justify-content: center; font-size: 14px; font-weight: 600; color: #5F5E5A; flex-shrink: 0;
    }
    .user-info { flex: 1; }
    .user-name { font-size: 14px; font-weight: 500; color: #2C2C2A; }
    .user-meta { font-size: 12px; color: #888780; }
    .role-select {
      font-size: 12px; padding: 4px 8px; border: 1px solid rgba(211,209,199,0.8);
      border-radius: 6px; background: white; color: #444441; cursor: pointer;
    }

    /* ── АРХИВ ── */
    .archive-item {
      padding: 12px 24px; border-bottom: 1px solid rgba(211,209,199,0.3);
    }
    .archive-item-title { font-size: 14px; color: #5F5E5A; margin-bottom: 4px; }
    .archive-item-meta { font-size: 12px; color: #B4B2A9; margin-bottom: 6px; }
    .btn-unarchive {
      font-size: 11px; color: #639922; background: #EAF3DE;
      border: none; border-radius: 4px; padding: 3px 10px; cursor: pointer;
    }
    .btn-unarchive:hover { background: #C0DD97; }
  </style>
</head>
<body>

<!-- ══════════════ ЛОГИН ══════════════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Task Manager</h1>
    <p>Войдите чтобы продолжить</p>
    <input type="text" id="loginUsername" placeholder="Логин" />
    <input type="password" id="loginPassword" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()" />
    <button class="btn-login" onclick="login()">Войти</button>
    <div class="login-error" id="loginError">Неверный логин или пароль</div>
  </div>
</div>

<!-- ══════════════ ПРИЛОЖЕНИЕ ══════════════ -->
<div id="app" style="display:none;">
  <header>
    <h1>Task Manager</h1>
    <div class="header-center">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Поиск задач..." oninput="renderBoard(allColumns, allTasks)" />
      </div>
    </div>
    <div class="header-right">
      <span class="header-stats" id="headerStats"></span>
      <span class="user-badge" id="userBadge"></span>
      <button class="header-btn" onclick="toggleArchive()">📦 Архив</button>
      <button class="header-btn" id="btnUsers" onclick="toggleUsers()" style="display:none;">👥 Пользователи</button>
      <button class="header-btn" id="settingsToggle" onclick="toggleSettings()" style="display:none;">⚙ Настройки</button>
      <button class="header-btn" onclick="logout()">Выйти</button>
    </div>
  </header>

  
  <div class="stats-bar" id="statsBar"></div>

  <div class="board-wrapper">
    <div class="board" id="board">
      <button class="btn-add-column" id="btnAddColumn" onclick="openAddColumn()" style="display:none;">
        + Добавить колонку
      </button>
    </div>
  </div>
</div>

<!-- ══════════════ МОДАЛКА: ЗАДАЧА ══════════════ -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2 id="taskModalTitle">Новая задача</h2>
    <label>Название</label>
    <input type="text" id="taskTitle" placeholder="Название задачи" />
    <label>Комментарий</label>
    <textarea id="taskComment" placeholder="Заметка (необязательно)"></textarea>
    <label>Приоритет</label>
    <select id="taskPriority">
      <option value="low">🟢 Низкий</option>
      <option value="medium" selected>🟡 Средний</option>
      <option value="high">🔴 Высокий</option>
    </select>
    <label>Время</label>
    <input type="text" id="taskTime" placeholder="Например 10:40" />
    <label>Дедлайн</label>
    <input type="date" id="taskDeadline" />
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeTaskModal()">Отмена</button>
      <button class="btn-primary" onclick="saveTask()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ══════════════ МОДАЛКА: КОЛОНКА ══════════════ -->
<div class="modal-overlay" id="columnModal">
  <div class="modal">
    <h2 id="columnModalTitle">Новая колонка</h2>
    <label>Название</label>
    <input type="text" id="columnName" placeholder="Название колонки" />
    <label>Цвет колонки</label>
    <input type="color" id="columnColor" value="#E8E2D8" style="height:40px;" />
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeColumnModal()">Отмена</button>
      <button class="btn-primary" onclick="saveColumn()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ══════════════ НАСТРОЙКИ ══════════════ -->
<div class="side-panel panel-right" id="settingsPanel">
  <div class="panel-header">
    <h2>Настройки доски</h2>
    <button class="panel-close" onclick="toggleSettings()">✕</button>
  </div>
  <div class="panel-body">
    <div class="settings-section">
      <label>Готовые темы</label>
      <div class="theme-grid">
        <div class="theme-swatch active" style="background:#F5F0E8;" data-theme="beige" onclick="applyTheme('beige')"><span>Бежевая</span></div>
        <div class="theme-swatch" style="background:#F0F4F8;" data-theme="blue" onclick="applyTheme('blue')"><span>Голубая</span></div>
        <div class="theme-swatch" style="background:#F0F4F0;" data-theme="green" onclick="applyTheme('green')"><span>Зелёная</span></div>
        <div class="theme-swatch" style="background:#FAF0F0;" data-theme="rose" onclick="applyTheme('rose')"><span>Розовая</span></div>
        <div class="theme-swatch" style="background:#F5F5F0;" data-theme="gray" onclick="applyTheme('gray')"><span>Серая</span></div>
        <div class="theme-swatch" style="background:#1A1A2E;" data-theme="dark" onclick="applyTheme('dark')"><span style="color:rgba(255,255,255,0.6)">Тёмная</span></div>
      </div>
    </div>
    <div class="settings-section">
      <label>Цвета</label>
      <div class="color-row"><span>Фон</span><input type="color" id="colorBg" value="#F5F0E8" oninput="applyCustomColor('bg', this.value)"></div>
      <div class="color-row"><span>Шапка</span><input type="color" id="colorHeader" value="#EDE8DF" oninput="applyCustomColor('header', this.value)"></div>
      <div class="color-row"><span>Карточки</span><input type="color" id="colorCard" value="#FFFFFF" oninput="applyCustomColor('card', this.value)"></div>
    </div>
    <div class="settings-section">
      <label>Прозрачность</label>
      <div class="opacity-row">
        <span>Шапка</span>
        <input type="range" id="opacityHeader" min="50" max="100" value="85" oninput="applyOpacity('Header', this.value)">
        <span class="opacity-val" id="opacityHeaderVal">85%</span>
      </div>
      <div class="opacity-row">
        <span>Колонки</span>
        <input type="range" id="opacityColumn" min="30" max="100" value="70" oninput="applyOpacity('Column', this.value)">
        <span class="opacity-val" id="opacityColumnVal">70%</span>
      </div>
      <div class="opacity-row">
        <span>Карточки</span>
        <input type="range" id="opacityCard" min="50" max="100" value="85" oninput="applyOpacity('Card', this.value)">
        <span class="opacity-val" id="opacityCardVal">85%</span>
      </div>
    </div>
    <button class="btn-reset" onclick="resetTheme()">Сбросить к стандарту</button>
  </div>
</div>

<!-- ══════════════ ПОЛЬЗОВАТЕЛИ ══════════════ -->
<div class="side-panel panel-wide" id="usersPanel">
  <div class="panel-header">
    <h2>Пользователи</h2>
    <button class="panel-close" onclick="toggleUsers()">✕</button>
  </div>
  <div id="usersList"></div>
</div>

<!-- ══════════════ АРХИВ ══════════════ -->
<div class="side-panel panel-left" id="archivePanel">
  <div class="panel-header">
    <h2>Архив задач - ⛔ НЕ РАБОТАЕТ</h2>
    <button class="panel-close" onclick="toggleArchive()">✕</button>
  </div>
  <div id="archiveList"></div>
</div>

<script>
  const API = 'http://127.0.0.1:8000/api';
  let token = localStorage.getItem('token');
  let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
  let currentColumnId = null;
  let editingTaskId = null;
  let editingColumnId = null;
  let allTasks = [];
  let allColumns = [];
  let draggedCard = null;
  let draggedTaskId = null;
  let draggedColEl = null;
  let boardInterval = null;

  // ══════════════════════════════
  //         АВТОРИЗАЦИЯ
  // ══════════════════════════════

  async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';
    try {
      const res = await fetch(`${API}/token/`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      token = data.access;
      localStorage.setItem('token', token);
      await loadCurrentUser(username);
      showApp();
    } catch { errorEl.style.display = 'block'; }
  }

  async function loadCurrentUser(username) {
    const res = await fetch(`${API}/users/`, { headers: authHeaders() });
    const data = await res.json();
    const list = data.results || data;
    currentUser = list.find(u => u.username === username) || list[0];
    localStorage.setItem('currentUser', JSON.stringify(currentUser));
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('currentUser');
    if (boardInterval) clearInterval(boardInterval);
    token = null; currentUser = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  function canManage() {
    return ['admin','chief','lead'].includes(currentUser?.role);
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userBadge').textContent = currentUser?.full_name || currentUser?.username || '';
    const canCol = ['admin','chief'].includes(currentUser?.role);
    document.getElementById('btnAddColumn').style.display = canCol ? 'block' : 'none';
    document.getElementById('settingsToggle').style.display = canCol ? 'block' : 'none';
    document.getElementById('btnUsers').style.display = canManage() ? 'block' : 'none';
    loadTheme();
    loadBoard();
    if (boardInterval) clearInterval(boardInterval);
    boardInterval = setInterval(loadBoard, 5000);
  }

  // ══════════════════════════════
  //           ДОСКА
  // ══════════════════════════════

  async function loadBoard() {
    try {
      const [colRes, taskRes] = await Promise.all([
        fetch(`${API}/columns/`, { headers: authHeaders() }),
        fetch(`${API}/tasks/`, { headers: authHeaders() })
      ]);
      if (colRes.status === 401) { logout(); return; }
      const cols = await colRes.json();
      const tasks = await taskRes.json();
      allColumns = cols.results || cols;
      allTasks = tasks.results || tasks;
      if (!Array.isArray(allColumns)) return;
      renderBoard(allColumns, allTasks);
      updateStats();
    } catch(e) { console.error(e); }
  }

  function renderBoard(columns, tasks) {
    const board = document.getElementById('board');
    const btnAdd = document.getElementById('btnAddColumn');
    board.innerHTML = '';

    const t = JSON.parse(localStorage.getItem('boardTheme') || '{}');
    const cardColor = t.card || '#FFFFFF';
    const cardOp = (t.opacityCard || 85) / 100;
    const colOp = (t.opacityColumn || 70) / 100;
    const search = document.getElementById('searchInput')?.value?.toLowerCase() || '';

    columns.forEach(col => {
      let colTasks = tasks.filter(t => t.column === col.id);
      if (search) colTasks = colTasks.filter(t => t.title.toLowerCase().includes(search) || (t.comment||'').toLowerCase().includes(search));

      const colEl = document.createElement('div');
      colEl.className = 'column' + (col.is_collapsed ? ' collapsed' : '');
      colEl.dataset.colId = col.id;
      colEl.style.background = hexToRgba(col.color || '#E8E2D8', colOp);

      colEl.innerHTML = `
        <div class="column-header">
          <span class="column-title">${col.name}</span>
          ${!col.is_collapsed ? `<span class="column-count">${colTasks.length}</span>` : ''}
          <div class="column-actions">
            // <button class="col-btn" onclick="toggleCollapse(${col.id}, '${col.is_collapsed}')">${col.is_collapsed ? '' : ''}</button>
            ${canManage() ? `
                <button class="col-btn" onclick="openEditColumn(${col.id}, '${escHtml(col.name)}', '${col.color||'#E8E2D8'}')">✎</button>
                <button class="col-btn" onclick="deleteColumn(${col.id})" style="color:#E24B4A;">✕</button>
            ` : ''}
          </div>
        </div>
        <div class="tasks" id="tasks-${col.id}">
          ${colTasks.map(t => renderTask(t, cardColor, cardOp)).join('')}
        </div>
        <button class="btn-add-task" onclick="openAddTask(${col.id})">+ Добавить задачу</button>
      `;

      colEl.setAttribute('draggable', canManage() ? 'true' : 'false');
      colEl.addEventListener('dragstart', onColDragStart);
      colEl.addEventListener('dragend', onColDragEnd);
      colEl.addEventListener('dragover', onColDragOver);
      colEl.addEventListener('drop', onColDrop);
      board.appendChild(colEl);
    });

    board.appendChild(btnAdd);

    document.querySelectorAll('.task-card').forEach(card => {
      card.addEventListener('dragstart', onDragStart);
      card.addEventListener('dragend', onDragEnd);
    });
    document.querySelectorAll('.column .tasks').forEach(zone => {
      zone.addEventListener('dragover', onDragOver);
      zone.addEventListener('dragleave', onDragLeave);
      zone.addEventListener('drop', onDrop);
    });
  }

  function renderTask(task, cardColor, cardOp) {
    const deadline = task.deadline ? deadlineInfo(task.deadline) : null;
    const bg = hexToRgba(cardColor, cardOp);
    return `
      <div class="task-card" style="background:${bg}" draggable="true" data-task-id="${task.id}" data-column-id="${task.column}">
        <div class="priority-bar priority-${task.priority}"></div>
        <div class="task-title">${escHtml(task.title)}</div>
        ${task.comment ? `<div class="task-comment">${escHtml(task.comment)}</div>` : ''}
        <div class="task-meta">
          ${task.time ? `<span class="task-time">🕐 ${task.time}</span>` : ''}
          ${deadline ? `<span class="task-deadline ${deadline.cls}">${deadline.label}</span>` : ''}
          ${canManage() && task.created_by_name ? `<span>${task.created_by_name}</span>` : ''}
        </div>
        <div class="task-footer">
          <button class="task-action-btn" onclick="openEditTask(${task.id})">✎ Изменить</button>
          <button class="task-action-btn" onclick="archiveTask(${task.id})">📦 Архив</button>
        </div>
      </div>
    `;
  }

  function deadlineInfo(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr);
    const diff = Math.ceil((d - today) / 86400000);
    if (diff < 0) return { cls: 'deadline-overdue', label: 'Просрочено' };
    if (diff === 0) return { cls: 'deadline-soon', label: 'Сегодня' };
    if (diff <= 2) return { cls: 'deadline-soon', label: `Через ${diff} дн.` };
    return { cls: 'deadline-ok', label: d.toLocaleDateString('ru') };
  }

  function updateStats() {
    const total = allTasks.length;
    const high = allTasks.filter(t => t.priority === 'high').length;
    const overdue = allTasks.filter(t => t.deadline && new Date(t.deadline) < new Date()).length;
    document.getElementById('headerStats').textContent =
      `Задач: ${total}${high ? ` · 🔴 ${high}` : ''}${overdue ? ` · ⚠ ${overdue}` : ''}`;
    document.getElementById('statsBar').innerHTML = `
      <span>Всего: <strong>${total}</strong></span>
      <span>Колонок: <strong>${allColumns.length}</strong></span>
      <span>Высокий приоритет: <strong>${high}</strong></span>
      ${overdue ? `<span style="color:#A32D2D">Просрочено: <strong>${overdue}</strong></span>` : ''}
    `;
  }

  // ══════════════════════════════
  //           ЗАДАЧИ
  // ══════════════════════════════

  function openAddTask(columnId) {
    currentColumnId = columnId; editingTaskId = null;
    document.getElementById('taskModalTitle').textContent = 'Новая задача';
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskComment').value = '';
    document.getElementById('taskTime').value = '';
    document.getElementById('taskDeadline').value = '';
    document.getElementById('taskPriority').value = 'medium';
    document.getElementById('taskModal').classList.add('active');
  }

  function openEditTask(taskId) {
    const task = allTasks.find(t => t.id === taskId);
    if (!task) return;
    editingTaskId = taskId; currentColumnId = task.column;
    document.getElementById('taskModalTitle').textContent = 'Редактировать задачу';
    document.getElementById('taskTitle').value = task.title;
    document.getElementById('taskComment').value = task.comment || '';
    document.getElementById('taskTime').value = task.time || '';
    document.getElementById('taskDeadline').value = task.deadline || '';
    document.getElementById('taskPriority').value = task.priority || 'medium';
    document.getElementById('taskModal').classList.add('active');
  }

  function closeTaskModal() {
    document.getElementById('taskModal').classList.remove('active');
    editingTaskId = null;
  }

  async function saveTask() {
    const title = document.getElementById('taskTitle').value.trim();
    if (!title) return;
    const payload = {
      title,
      comment: document.getElementById('taskComment').value.trim(),
      time: document.getElementById('taskTime').value.trim(),
      priority: document.getElementById('taskPriority').value,
      column: currentColumnId,
    };
    const deadline = document.getElementById('taskDeadline').value;
    if (deadline) payload.deadline = deadline;

    const url = editingTaskId ? `${API}/tasks/${editingTaskId}/` : `${API}/tasks/`;
    const method = editingTaskId ? 'PATCH' : 'POST';
    await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(payload) });
    closeTaskModal();
    loadBoard();
  }

  async function archiveTask(taskId) {
    await fetch(`${API}/tasks/${taskId}/archive/`, { method: 'POST', headers: authHeaders() });
    loadBoard();
  }

  // ══════════════════════════════
  //           АРХИВ
  // ══════════════════════════════

  async function toggleArchive() {
    const panel = document.getElementById('archivePanel');
    panel.classList.toggle('open');
    if (!panel.classList.contains('open')) return;
    const res = await fetch(`${API}/tasks/?archived=true`, { headers: authHeaders() });
    const data = await res.json();
    const tasks = data.results || data;
    const list = document.getElementById('archiveList');
    if (!tasks.length) {
      list.innerHTML = '<div style="padding:24px;color:#888780;font-size:14px;">Архив пуст</div>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="archive-item">
        <div class="archive-item-title">${escHtml(t.title)}</div>
        <div class="archive-item-meta">${t.created_by_name} · ${new Date(t.created_at).toLocaleDateString('ru')}</div>
        <button class="btn-unarchive" onclick="unarchiveTask(${t.id})">Восстановить</button>
      </div>
    `).join('');
  }

async function unarchiveTask(taskId) {
    await fetch(`${API}/tasks/${taskId}/unarchive/`, {
      method: 'POST', headers: authHeaders()
    });
    // Обновляем архив и доску
    await loadBoard();
    // Перезагружаем список архива
    const res = await fetch(`${API}/tasks/?archived=true`, { headers: authHeaders() });
    const data = await res.json();
    const tasks = data.results || data;
    const list = document.getElementById('archiveList');
    if (!tasks.length) {
      list.innerHTML = '<div style="padding:24px;color:#888780;font-size:14px;">Архив пуст</div>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="archive-item">
        <div class="archive-item-title">${escHtml(t.title)}</div>
        <div class="archive-item-meta">${t.created_by_name} · ${new Date(t.created_at).toLocaleDateString('ru')}</div>
        <button class="btn-unarchive" onclick="unarchiveTask(${t.id})">Восстановить</button>
      </div>
    `).join('');
  }

  // ══════════════════════════════
  //           КОЛОНКИ
  // ══════════════════════════════

  function openAddColumn() {
    editingColumnId = null;
    document.getElementById('columnModalTitle').textContent = 'Новая колонка';
    document.getElementById('columnName').value = '';
    document.getElementById('columnColor').value = '#E8E2D8';
    document.getElementById('columnModal').classList.add('active');
  }

  function openEditColumn(id, name, color) {
    editingColumnId = id;
    document.getElementById('columnModalTitle').textContent = 'Редактировать колонку';
    document.getElementById('columnName').value = name;
    document.getElementById('columnColor').value = color || '#E8E2D8';
    document.getElementById('columnModal').classList.add('active');
  }

  function closeColumnModal() {
    document.getElementById('columnModal').classList.remove('active');
    editingColumnId = null;
  }

  async function saveColumn() {
    const name = document.getElementById('columnName').value.trim();
    const color = document.getElementById('columnColor').value;
    if (!name) return;
    if (editingColumnId) {
      await fetch(`${API}/columns/${editingColumnId}/`, {
        method: 'PATCH', headers: authHeaders(), body: JSON.stringify({ name, color })
      });
    } else {
      await fetch(`${API}/columns/`, {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ name, color, order: allColumns.length })
      });
    }
    closeColumnModal();
    loadBoard();
  }

  async function deleteColumn(colId) {
    if (!confirm('Удалить колонку? Все задачи в ней тоже будут удалены.')) return;
    await fetch(`${API}/columns/${colId}/`, {
      method: 'DELETE', headers: authHeaders()
    });
    loadBoard();
  }

  async function toggleCollapse(colId, isCollapsed) {
    const collapsed = isCollapsed === true || isCollapsed === 'true';
    await fetch(`${API}/columns/${colId}/`, {
      method: 'PATCH', headers: authHeaders(),
      body: JSON.stringify({ is_collapsed: !collapsed })
    });
    loadBoard();
  }
  // ══════════════════════════════
  //       ПОЛЬЗОВАТЕЛИ
  // ══════════════════════════════

  async function toggleUsers() {
    const panel = document.getElementById('usersPanel');
    panel.classList.toggle('open');
    if (!panel.classList.contains('open')) return;
    const res = await fetch(`${API}/users/`, { headers: authHeaders() });
    const data = await res.json();
    const users = data.results || data;
    const roles = { admin:'Admin', chief:'Главный специалист', lead:'Ведущий специалист', specialist:'Специалист', junior:'Младший специалист' };
    document.getElementById('usersList').innerHTML = users.map(u => {
      const initials = ((u.first_name||'')[0]||(u.username||'')[0]||'?').toUpperCase() +
                       ((u.last_name||'')[0]||'').toUpperCase();
      return `
        <div class="user-card">
          <div class="user-avatar">${initials}</div>
          <div class="user-info">
            <div class="user-name">${u.full_name || u.username}</div>
            <div class="user-meta">${roles[u.role]||u.role}${u.telegram_username ? ' · @'+u.telegram_username : ''}</div>
          </div>
          ${canManage() ? `
            <select class="role-select" onchange="changeRole(${u.id}, this.value)">
              ${Object.entries(roles).map(([v,l])=>`<option value="${v}"${u.role===v?' selected':''}>${l}</option>`).join('')}
            </select>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  async function changeRole(userId, role) {
    await fetch(`${API}/users/${userId}/`, {
      method: 'PATCH', headers: authHeaders(), body: JSON.stringify({ role })
    });
  }

  // ══════════════════════════════
  //    DRAG & DROP — ЗАДАЧИ
  // ══════════════════════════════

  function onDragStart(e) {
    if (draggedColEl) return;
    draggedCard = e.currentTarget;
    draggedTaskId = draggedCard.dataset.taskId;
    setTimeout(() => draggedCard?.classList.add('dragging'), 0);
  }

  function onDragEnd() {
    draggedCard?.classList.remove('dragging');
    document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    draggedCard = null; draggedTaskId = null;
  }

  function onDragOver(e) {
    if (draggedColEl) return;
    e.preventDefault();
    const zone = e.currentTarget;
    zone.closest('.column')?.classList.add('drag-over');
    document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
    const ph = document.createElement('div');
    ph.className = 'drag-placeholder';
    const after = getDragAfter(zone, e.clientY);
    after ? zone.insertBefore(ph, after) : zone.appendChild(ph);
  }

  function onDragLeave(e) {
    if (!e.currentTarget.contains(e.relatedTarget)) {
      e.currentTarget.closest('.column')?.classList.remove('drag-over');
      document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
    }
  }

  async function onDrop(e) {
    if (draggedColEl) return;
    e.preventDefault();
    const col = e.currentTarget.closest('.column');
    const newColId = parseInt(col?.dataset.colId);
    col?.classList.remove('drag-over');
    document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
    if (!draggedTaskId || !newColId) return;
    await fetch(`${API}/tasks/${draggedTaskId}/`, {
      method: 'PATCH', headers: authHeaders(), body: JSON.stringify({ column: newColId })
    });
    loadBoard();
  }

  function getDragAfter(zone, y) {
    return [...zone.querySelectorAll('.task-card:not(.dragging)')].reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      return offset < 0 && offset > closest.offset ? { offset, element: child } : closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  // ══════════════════════════════
  //    DRAG & DROP — КОЛОНКИ
  // ══════════════════════════════

  function onColDragStart(e) {
    if (e.target.closest('.task-card') || e.target.closest('.col-btn')) return;
    draggedColEl = e.currentTarget;
    setTimeout(() => draggedColEl?.classList.add('dragging-col'), 0);
  }

  function onColDragEnd() {
    draggedColEl?.classList.remove('dragging-col');
    draggedColEl = null;
  }

  function onColDragOver(e) {
    if (!draggedColEl) return;
    e.preventDefault();
    const target = e.currentTarget;
    if (target === draggedColEl || target.classList.contains('btn-add-column')) return;
    const board = document.getElementById('board');
    const cols = [...board.querySelectorAll('.column')];
    if (cols.indexOf(draggedColEl) < cols.indexOf(target)) board.insertBefore(draggedColEl, target.nextSibling);
    else board.insertBefore(draggedColEl, target);
  }

  async function onColDrop(e) {
    if (!draggedColEl) return;
    e.preventDefault();
    const cols = [...document.getElementById('board').querySelectorAll('.column')];
    const orders = cols.map((c, i) => ({ id: parseInt(c.dataset.colId), order: i }));
    await fetch(`${API}/columns/reorder/`, {
      method: 'POST', headers: authHeaders(), body: JSON.stringify({ orders })
    });
    loadBoard();
  }

  // ══════════════════════════════
  //         НАСТРОЙКИ
  // ══════════════════════════════

  const themes = {
    beige: { bg:'#F5F0E8', column:'#E8E2D8', header:'#EDE8DF', card:'#FFFFFF' },
    blue:  { bg:'#F0F4F8', column:'#DDE8F0', header:'#E8EEF5', card:'#FFFFFF' },
    green: { bg:'#F0F4F0', column:'#DDE8DD', header:'#E8F0E8', card:'#FFFFFF' },
    rose:  { bg:'#FAF0F0', column:'#F0DEDE', header:'#F5E8E8', card:'#FFF8F8' },
    gray:  { bg:'#F5F5F0', column:'#E5E5E0', header:'#EDEDEA', card:'#FFFFFF' },
    dark:  { bg:'#1A1A2E', column:'#16213E', header:'#0F3460', card:'#1E2A45' },
  };

  function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }

  function applyTheme(name) {
    const t = themes[name]; if (!t) return;
    const saved = JSON.parse(localStorage.getItem('boardTheme')||'{}');
    const merged = { ...saved, ...t };
    saveTheme(merged); applyColors(merged);
    document.getElementById('colorBg').value = t.bg;
    document.getElementById('colorHeader').value = t.header;
    document.getElementById('colorCard').value = t.card;
    document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
    document.querySelector(`[data-theme="${name}"]`)?.classList.add('active');
  }

  function applyCustomColor(type, value) {
    const c = JSON.parse(localStorage.getItem('boardTheme')||'{}');
    c[type] = value; saveTheme(c); applyColors(c);
  }

  function applyOpacity(type, value) {
    document.getElementById(`opacity${type}Val`).textContent = value + '%';
    const c = JSON.parse(localStorage.getItem('boardTheme')||'{}');
    c[`opacity${type}`] = parseInt(value); saveTheme(c);
    renderBoard(allColumns, allTasks);
  }

  function applyColors(t) {
    if (t.bg) document.body.style.backgroundColor = t.bg;
    if (t.header) {
      const op = (t.opacityHeader || 85) / 100;
      const h = document.querySelector('header');
      if (h) h.style.background = hexToRgba(t.header, op);
    }
    renderBoard(allColumns, allTasks);
  }

  function saveTheme(c) { localStorage.setItem('boardTheme', JSON.stringify(c)); }

  function loadTheme() {
    const saved = localStorage.getItem('boardTheme');
    if (!saved) return;
    const t = JSON.parse(saved);
    if (t.bg) document.body.style.backgroundColor = t.bg;
    if (t.header) {
      const h = document.querySelector('header');
      if (h) h.style.background = hexToRgba(t.header, (t.opacityHeader||85)/100);
    }
    ['Bg','Header','Card'].forEach(k => {
      const el = document.getElementById(`color${k}`);
      if (el && t[k.toLowerCase()]) el.value = t[k.toLowerCase()];
    });
    ['Header','Column','Card'].forEach(k => {
      const el = document.getElementById(`opacity${k}`);
      const val = t[`opacity${k}`];
      if (el && val) { el.value = val; document.getElementById(`opacity${k}Val`).textContent = val+'%'; }
    });
  }

  function resetTheme() { localStorage.removeItem('boardTheme'); applyTheme('beige'); }

  // ══════════════════════════════
  //         УТИЛИТЫ
  // ══════════════════════════════

  function hexToRgba(hex, op) {
    if (!hex?.startsWith('#')) return hex;
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${op})`;
  }

  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ══════════════════════════════
  //           СТАРТ
  // ══════════════════════════════

  if (token && currentUser) { showApp(); }
</script>
